name: Mirror to Personal Repo for Vercel Free

on:
  push:
    branches: ["feat/17-vercel-mirror-v2"]

jobs:
  git-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ⭐ [핵심 1] checkout 액션이 기본 봇 토큰을 로컬 기기에 저장하지 않도록 설정
          persist-credentials: false 

      - name: Mirror to Personal Repo
        run: |
          # 1. 깃 유저 정보 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ⭐ [핵심 2] 혹시 남아있을지 모르는 기존 인증 헤더를 강제로 삭제
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          # 3. 변수 및 URL 설정
          TARGET_REPO="github.com/YeongJae0114/ject-study-mirror.git"
          REMOTE_URL="https://${{ secrets.MIRROR_TOKEN }}@${TARGET_REPO}"
          
          # 4. 강제 푸시 (내 개인 토큰 주소로 명확하게 푸시)
          git push --force "${REMOTE_URL}" feat/17-vercel-mirror-v2
