name: Mirror to Personal Repo for Vercel Free

on:
  push:
    branches: ["develop"]

jobs:
  git-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # HTTPS와 토큰을 잘 지원하는 플러그인으로 변경
      - name: Mirror to Personal Repo
        uses: s0/git-publish-action@v1
        env:
          REPOSITORY_URL: "https://github.com/YeongJae0114/ject-study-mirror.git"
          BRANCH_NAME: "develop" # 미러링할 브랜치명
          GITHUB_TOKEN: ${{ secrets.MIRROR_TOKEN }}